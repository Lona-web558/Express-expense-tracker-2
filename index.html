<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <div class="header">

        <p>
            Welcome,
            <strong id="username"></strong>
        </p>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

    <hr>

    <h2>Add Expense</h2>

    <form id="expenseForm">

        <input
            type="text"
            id="title"
            placeholder="Expense Name"
            required
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount"
            min="0"
            step="0.01"
            required
        >

        <button type="submit">
            Add Expense
        </button>

    </form>

    <h2>
        Total:
        $<span id="total">0.00</span>
    </h2>

    <ul id="expenseList">

    </ul>

</div>

<script src="script.js"></script>

</body>
</html>
